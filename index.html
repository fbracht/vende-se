<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogos à Venda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Jogos à Venda</h1>
      <p class="site-tagline">Jogos seminovos procurando novo lar</p>
    </div>
  </header>

  <main>
    <section class="carousel-section" aria-label="Jogos em destaque">
      <button class="carousel-arrow carousel-arrow--prev" type="button" aria-label="Jogo anterior">&#8592;</button>
      <div class="carousel-stage" id="carousel-stage">
        <!-- Game card injected by JS -->
      </div>
      <button class="carousel-arrow carousel-arrow--next" type="button" aria-label="Próximo jogo">&#8594;</button>
    </section>

    <section class="games-list-section" aria-label="Todos os jogos">
      <h2 class="section-title">Todos os jogos</h2>
      <div class="games-grid" id="games-grid">
        <!-- Game thumbnails injected by JS -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Dúvidas? Chama no WhatsApp!</p>
  </footer>

  <!-- Lightbox -->
  <dialog class="lightbox" id="lightbox" aria-label="Imagem ampliada">
    <button class="lightbox-close" id="lightbox-close" type="button" aria-label="Fechar">&#x2715;</button>
    <button class="lightbox-arrow lightbox-arrow--prev" id="lightbox-prev" type="button" aria-label="Imagem anterior">&#8592;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    <button class="lightbox-arrow lightbox-arrow--next" id="lightbox-next" type="button" aria-label="Próxima imagem">&#8594;</button>
  </dialog>
